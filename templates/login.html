<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Apply a consistent font-family for a modern feel */
        body {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center text-gray-100">

    <!-- Login Container Card -->
    <div class="bg-gray-800 shadow-2xl rounded-xl p-10 max-w-sm w-full transform transition duration-500 hover:scale-105 border border-gray-700">
        <!-- Card Header with Icon -->
        <div class="flex flex-col items-center space-y-4 mb-8">
            <!-- User Icon (can be replaced with a logo) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A11.002 11.002 0 0112 15c2.31 0 4.475.922 6.096 2.593M17 10a5 5 0 11-10 0 5 5 0 0110 0z" />
            </svg>
            <h2 class="text-3xl font-extrabold text-white">Login</h2>
        </div>

        <!-- Login Form -->
        <form method="POST" class="space-y-6">
            {%csrf_token%}
            <!-- CSRF Token Placeholder -->
            <!-- The {% csrf_token %} tag is a placeholder for your web framework's security token -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-400">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required 
                       class="mt-1 block w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-400">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required 
                       class="mt-1 block w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Login Button -->
            <div>
                <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition duration-300 transform hover:-translate-y-1">
                    Login
                </button>
            </div>
        </form>

        <!-- Error Message Placeholder -->
        {% if error %}
        <p class="text-red-500 text-sm mt-4 text-center">{{ error }}</p>
        {% endif %}

        <p class="text-center text-gray-500 text-xs mt-6">Don't have an account? <a href="#" class="text-indigo-500 hover:underline">Sign up</a></p>
    </div>
</body>
</html>
