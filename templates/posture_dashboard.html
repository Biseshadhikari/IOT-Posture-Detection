{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Posture Analysis Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 1rem; }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Posture Analysis Dashboard</h1>

    <!-- Charts -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">Daily Good Posture Rate</div>
                <div class="card-body">
                    <canvas id="dailyChart" height="200"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">Weekly Good Posture Rate</div>
                <div class="card-body">
                    <canvas id="weeklyChart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Cluster + Peak Hours -->
    <div class="row g-4 mt-1">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning">Peak Bad Posture Hours</div>
                <div class="card-body">
                    <ul id="peakHours" class="list-group"></ul>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">Posture Patterns (Clusters)</div>
                <div class="card-body">
                    <canvas id="clusterChart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Streak + Suggestions -->
    <div class="row g-4 mt-1">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white">Longest Good Streak</div>
                <div class="card-body text-center">
                    <h3 id="goodStreak"></h3>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">AI Suggestions</div>
                <div class="card-body">
                    <ul id="suggestions" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Anomalies -->
    <div class="row g-4 mt-1">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">Recent Anomalies</div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr><th>Timestamp</th><th>Param1</th><th>Param2</th><th>Param3</th></tr>
                        </thead>
                        <tbody id="anomaliesTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadAnalysis() {
    const res = await fetch("{% url 'posture_analysis' %}");
    const data = await res.json();

    // Daily Chart
    const dailyLabels = data.daily.map(d => d.date);
    const dailyRates = data.daily.map(d => d.good_rate ? d.good_rate * 100 : null);

    new Chart(document.getElementById("dailyChart"), {
        type: "line",
        data: {
            labels: dailyLabels,
            datasets: [{
                label: "% Good Posture",
                data: dailyRates,
                borderColor: "blue",
                backgroundColor: "rgba(0,123,255,0.2)",
                fill: true,
                tension: 0.3
            }]
        },
        options: { scales: { y: { min: 0, max: 100 } } }
    });

    // Weekly Chart
    const weekLabels = data.weekly.map(d => d.week);
    const weekRates = data.weekly.map(d => d.good_rate ? d.good_rate * 100 : null);

    new Chart(document.getElementById("weeklyChart"), {
        type: "bar",
        data: {
            labels: weekLabels,
            datasets: [{
                label: "% Good Posture",
                data: weekRates,
                backgroundColor: "rgba(40,167,69,0.6)"
            }]
        },
        options: { scales: { y: { min: 0, max: 100 } } }
    });

    // Cluster Shares
    if (data.cluster_shares.length > 0) {
        new Chart(document.getElementById("clusterChart"), {
            type: "pie",
            data: {
                labels: data.cluster_shares.map(c => "Cluster " + c.cluster),
                datasets: [{
                    data: data.cluster_shares.map(c => c.share * 100),
                    backgroundColor: ["#007bff", "#28a745", "#ffc107", "#dc3545"]
                }]
            }
        });
    }

    // Peak Hours
    const peakHoursEl = document.getElementById("peakHours");
    peakHoursEl.innerHTML = "";
    if (data.peak_bad_hours.length === 0) {
        peakHoursEl.innerHTML = "<li class='list-group-item'>No bad posture peaks detected.</li>";
    } else {
        data.peak_bad_hours.forEach(p => {
            const li = document.createElement("li");
            li.className = "list-group-item";
            li.innerText = `${p.hour}:00 — ${p.count} bad postures`;
            peakHoursEl.appendChild(li);
        });
    }

    // Streak
    document.getElementById("goodStreak").innerText = data.longest_good_streak_days + " days";

    // Suggestions
    const suggEl = document.getElementById("suggestions");
    suggEl.innerHTML = "";
    data.suggestions.forEach(s => {
        const li = document.createElement("li");
        li.className = "list-group-item";
        li.innerText = s;
        suggEl.appendChild(li);
    });

    // Anomalies
    const tableBody = document.getElementById("anomaliesTable");
    tableBody.innerHTML = "";
    data.recent_anomalies.forEach(a => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${a.timestamp}</td><td>${a.param1.toFixed(2)}</td><td>${a.param2.toFixed(2)}</td><td>${a.param3.toFixed(2)}</td>`;
        tableBody.appendChild(tr);
    });
}

loadAnalysis();
</script>
</body>
</html>
